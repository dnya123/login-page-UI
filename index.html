<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #be99d8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #d1c6ee;
  padding: 30px;
  width: 320px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #007BFF;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.link {
  text-align: center;
  margin-top: 10px;
}

.link a {
  color: #007BFF;
  cursor: pointer;
}

/* Hide section */
.hidden {
  display: none;
}

  .error {
  color: red;
  font-size: 12px;
  margin-top: -8px;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginForm">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <div class="error" id="loginEmailError"></div>

    <input type="password" id="loginPassword" placeholder="Password">
    <div class="error" id="loginPasswordError"></div>
    <button onclick="return validateLogin()">Login</button>

    <div class="link">
      <p>Don't have an account? <a onclick="showRegister()">Register</a></p>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="registerForm" class="hidden">
    <h2>Register</h2>
    <input type="text" placeholder="Full Name">

    <input type="email" id="regEmail" placeholder="Email">
    <div class="error" id="regEmailError"></div>

    <input type="password" id="regPassword" placeholder="Password">
    <div class="error" id="regPasswordError"></div>

    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <div class="error" id="confirmPasswordError"></div>

    <button onclick="return validateRegister()">Register</button>

    <div class="link">
      <p>Already have an account? <a onclick="showLogin()">Login</a></p>
    </div>
  </div>

</div>

<script>
function showRegister() {
  document.getElementById("loginForm").classList.add("hidden");
  document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin() {
  document.getElementById("registerForm").classList.add("hidden");
  document.getElementById("loginForm").classList.remove("hidden");
}

// Email validation
function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Login validation
function validateLogin() {
  let email = document.getElementById("loginEmail").value;
  let password = document.getElementById("loginPassword").value;

  let emailError = document.getElementById("loginEmailError");
  let passwordError = document.getElementById("loginPasswordError");

  emailError.innerText = "";
  passwordError.innerText = "";

  let valid = true;

  if (!isValidEmail(email)) {
    emailError.innerText = "Enter valid email";
    valid = false;
  }

  if (password.length < 6) {
    passwordError.innerText = "Minimum 6 characters required";
    valid = false;
  }

  return valid;
}

// Register validation
function validateRegister() {
  let email = document.getElementById("regEmail").value;
  let password = document.getElementById("regPassword").value;
  let confirmPassword = document.getElementById("confirmPassword").value;

  let emailError = document.getElementById("regEmailError");
  let passwordError = document.getElementById("regPasswordError");
  let confirmError = document.getElementById("confirmPasswordError");

  emailError.innerText = "";
  passwordError.innerText = "";
  confirmError.innerText = "";

  let valid = true;

  if (!isValidEmail(email)) {
    emailError.innerText = "Enter valid email";
    valid = false;
  }

  if (password.length < 6) {
    passwordError.innerText = "Minimum 6 characters required";
    valid = false;
  }

  if (password !== confirmPassword) {
    confirmError.innerText = "Passwords do not match";
    valid = false;
  }

  return valid;
}
</script>

</body>
</html>
