<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #be99d8;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #d1c6ee;
      padding: 30px;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input:focus {
      border-color: #007BFF;
      outline: none;
    }

    .error {
      color: red;
      font-size: 12px;
      margin-bottom: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }

    .link {
      text-align: center;
      margin-top: 15px;
    }

    .link a {
      text-decoration: none;
      color: #007BFF;
    }

    .link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 400px) {
      .container {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Register</h2>

    <form>
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name" required>
      <div class="error"></div>

      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>
      <div class="error"></div>

      <label>Password</label>
      <input type="password" placeholder="Enter password" required>
      <div class="error"></div>

      <label>Confirm Password</label>
      <input type="password" placeholder="Confirm password" required>
      <div class="error"></div>

      <button type="submit">Register</button>
    </form>

    <div class="link">
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

</body>
</html>
